AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  fitsync
  
  AWS Lambda function that syncs Hevy workouts to Google Health.

Parameters:
  GoogleClientId:
    Type: String
    Description: Your Google Cloud OAuth Client ID
  GoogleClientSecret:
    Type: String
    Description: Your Google Cloud OAuth Client Secret
  SsmParameterName:
    Type: String
    Default: /fitsync/google_health_refresh_token
    Description: The AWS SSM Parameter Store key where the refresh token is kept
  HevyApiKey:
    Type: String
    NoEcho: true
    Description: Your Hevy API key for fetching workout details
  SlackBotToken:
    Type: String
    NoEcho: true
    Description: Slack bot user OAuth token (xoxb-...) with chat:write
  SlackChannel:
    Type: String
    Description: Slack channel ID or name (e.g. C0123456789 or #workouts) to post summaries to
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude weekly debrief
  GoalSsmParameterName:
    Type: String
    Default: /fitsync/goal
    Description: SSM parameter name storing the user's current fitness goal

Resources:
  AgentMemoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  DeduplicationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workoutId
          AttributeType: S
      KeySchema:
        - AttributeName: workoutId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  FitSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: main.handler
      Runtime: python3.14
      Architectures:
        - x86_64
      Timeout: 30
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          SSM_PARAMETER_NAME: !Ref SsmParameterName
          HEVY_API_KEY: !Ref HevyApiKey
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SLACK_CHANNEL: !Ref SlackChannel
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          GOAL_SSM_PARAMETER_NAME: !Ref GoalSsmParameterName
          DEDUP_TABLE_NAME: !Ref DeduplicationTable
          AGENT_MEMORY_TABLE_NAME: !Ref AgentMemoryTable
      Policies:
        # Give the Lambda function permission to read and update the parameter
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:PutParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterName}'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoalSsmParameterName}'
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt DeduplicationTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:Scan
              Resource: !GetAtt AgentMemoryTable.Arn
      Events:
        WebhookEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  DebriefFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: debrief.handler
      Runtime: python3.14
      Architectures:
        - x86_64
      Timeout: 60
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          SSM_PARAMETER_NAME: !Ref SsmParameterName
          HEVY_API_KEY: !Ref HevyApiKey
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SLACK_CHANNEL: !Ref SlackChannel
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          GOAL_SSM_PARAMETER_NAME: !Ref GoalSsmParameterName
          AGENT_MEMORY_TABLE_NAME: !Ref AgentMemoryTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:PutParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterName}'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoalSsmParameterName}'
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Scan
              Resource: !GetAtt AgentMemoryTable.Arn
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(30 15 ? * FRI *)
            Description: Friday 15:30 UTC (9pm IST) weekly Claude debrief

Outputs:
  FitSyncApi:
    Description: "API Gateway endpoint URL for Prod environment"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook"
  FitSyncFunctionArn:
    Description: "FitSync Lambda Function ARN"
    Value: !GetAtt FitSyncFunction.Arn
